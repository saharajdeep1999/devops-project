apiVersion: v1
kind: Service
metadata:
  name: crud-app-service
  namespace: default
  labels:
    app: crud-app
spec:
  type: NodePort
  selector:
    app: crud-app
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000
---
apiVersion: v1
kind: Service
metadata:
  name: crud-db-service
  namespace: default
  labels:
    app: crud-db
spec:
  type: ClusterIP
  selector:
    app: crud-db
  ports:
    - name: postgres
      protocol: TCP
      port: 5432
      targetPort: 5432
